<!DOCTYPE html>
<html lang="zh-TW" class="bg-[#0A0A0A]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耳顏所會員系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0A0A0A; color: #F5F5F5; }
        .page { display: none; }
        .page.active { display: block; }
        .option-selected { border: 1px solid #D4AF37 !important; background-color: #1a1a1a; }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 border-b border-zinc-900">
        <p class="text-[10px] tracking-[0.2em] text-[#D4AF37] uppercase font-light">IAURI MEMBER</p>
        <h1 class="text-xl font-bold">耳顏所會員系統</h1>
    </header>

    <main class="max-w-md w-full mx-auto px-4 py-6">
        
        <div id="booking-page" class="page active">
            <h2 class="text-lg font-bold mb-4">預約新理療</h2>
            
            <div id="step-1" class="space-y-4">
                <div onclick="selectItem(this, 'step-2')" class="p-6 bg-zinc-900 rounded-2xl border border-zinc-800 cursor-pointer hover:border-zinc-600">
                    <p class="font-bold">免費兩個月瘦小臉計畫</p>
                    <p class="text-xs text-zinc-500 mt-1">專屬會員免費體驗</p>
                </div>
                <div onclick="selectItem(this, 'step-2')" class="p-6 bg-zinc-900 rounded-2xl border border-zinc-800 cursor-pointer hover:border-zinc-600">
                    <p class="font-bold">精準局部體驗</p>
                    <p class="text-xs text-zinc-500 mt-1">$400</p>
                </div>
                <div onclick="selectItem(this, 'step-2')" class="p-6 bg-zinc-900 rounded-2xl border border-zinc-800 cursor-pointer hover:border-zinc-600">
                    <p class="font-bold">全息平衡調理</p>
                    <p class="text-xs text-zinc-500 mt-1">$800</p>
                </div>
            </div>

            <div id="step-2" class="hidden space-y-6">
                <button onclick="backToStep1()" class="text-zinc-500 text-sm mb-2"><i class="fa-solid fa-chevron-left mr-1"></i>重新選擇理療</button>
                <div>
                    <p class="font-bold mb-3">選擇預約日期</p>
                    <div class="flex space-x-2">
                        <div class="px-4 py-3 bg-[#D4AF37] text-black rounded-xl font-bold">5/27<br><span class="text-[10px]">今天</span></div>
                        <div class="px-4 py-3 bg-zinc-900 rounded-xl font-bold">5/28<br><span class="text-[10px]">週四</span></div>
                    </div>
                </div>
                <button class="w-full py-4 bg-[#D4AF37] text-black font-bold rounded-2xl">確認送出預約</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-[#0A0A0A] border-t border-zinc-900 flex justify-around p-4">
        <button class="flex flex-col items-center text-xs text-zinc-500"><i class="fa-solid fa-house mb-1"></i>首頁</button>
        <button class="flex flex-col items-center text-xs text-zinc-500"><i class="fa-solid fa-file-lines mb-1"></i>紀錄</button>
        <button class="flex flex-col items-center text-xs text-white"><i class="fa-solid fa-calendar mb-1"></i>預約</button>
    </nav>

    <script>
        function selectItem(el, nextStepId) {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById(nextStepId).classList.remove('hidden');
        }
        function backToStep1() {
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('step-2').classList.add('hidden');
        }
    </script>
</body>
</html>
