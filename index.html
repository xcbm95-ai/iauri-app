<!DOCTYPE html>
<html lang="zh-TW" class="bg-[#0A0A0A]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耳顏所會員系統</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #0A0A0A;
            color: #F5F5F5;
        }

        .page-content {
            display: none;
        }

        .page-content.active {
            display: block;
        }

        .gold-text {
            color: #D4AF37;
        }

        .gold-border {
            border: 1px solid rgba(212, 175, 55, 0.25);
        }

        .card-bg {
            background: #111111;
        }

        .smooth {
            transition: all .3s ease;
        }

        .booking-step {
            display: none;
        }

        .booking-step.active {
            display: block;
        }

        .date-btn,
        .time-btn {
            min-width: 80px;
        }

        .selected-slot {
            background: #D4AF37 !important;
            color: #000000 !important;
            border-color: #D4AF37 !important;
        }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="pb-28">

    <!-- HEADER -->
    <header class="sticky top-0 z-50 border-b border-zinc-900 bg-[#0A0A0A]/95 backdrop-blur">
        <div class="max-w-md mx-auto px-4 py-4">

            <p class="text-[10px] tracking-[0.3em] gold-text uppercase font-light mb-1">
                IAURI MEMBER
            </p>

            <div class="flex items-center justify-between">
                <h1 class="text-xl font-bold">
                    耳顏所會員系統
                </h1>

                <i class="fa-solid fa-crown gold-text"></i>
            </div>

        </div>
    </header>

    <!-- MAIN -->
    <main class="max-w-md mx-auto px-4 py-6">

        <!-- HOME -->
        <section id="page-home" class="page-content active">

            <!-- MEMBER CARD -->
            <div class="card-bg rounded-3xl p-6 gold-border mb-6">

                <div class="flex items-center space-x-4 mb-5">

                    <img
                        id="user-avatar"
                        class="w-16 h-16 rounded-full object-cover bg-zinc-800"
                    >

                    <div>
                        <h2 id="user-name" class="font-bold text-lg">
                            載入中...
                        </h2>

                        <p class="text-xs gold-text tracking-widest">
                            GOLD MEMBER
                        </p>
                    </div>

                </div>

                <!-- PROGRESS -->
                <div>

                    <div class="flex justify-between text-xs mb-2 text-zinc-400">
                        <span>本月會員進度</span>
                        <span>72%</span>
                    </div>

                    <div class="w-full h-2 bg-zinc-800 rounded-full overflow-hidden">
                        <div class="h-full bg-[#D4AF37] rounded-full w-[72%]"></div>
                    </div>

                </div>

            </div>

            <!-- MENU -->
            <div class="grid grid-cols-2 gap-4">

                <button
                    onclick="navTo('page-booking')"
                    class="card-bg rounded-2xl p-6 gold-border smooth hover:scale-[1.02]"
                >
                    <i class="fa-solid fa-calendar-check text-2xl gold-text mb-4"></i>

                    <p class="font-bold mb-1">
                        立即預約
                    </p>

                    <p class="text-xs text-zinc-500">
                        BOOKING
                    </p>
                </button>

                <button
                    class="card-bg rounded-2xl p-6 gold-border smooth hover:scale-[1.02]"
                >
                    <i class="fa-solid fa-id-card text-2xl gold-text mb-4"></i>

                    <p class="font-bold mb-1">
                        會員卡
                    </p>

                    <p class="text-xs text-zinc-500">
                        MEMBER CARD
                    </p>
                </button>

                <button
                    onclick="navTo('page-records')"
                    class="card-bg rounded-2xl p-6 gold-border smooth hover:scale-[1.02]"
                >
                    <i class="fa-solid fa-file-lines text-2xl gold-text mb-4"></i>

                    <p class="font-bold mb-1">
                        小臉紀錄
                    </p>

                    <p class="text-xs text-zinc-500">
                        RECORDS
                    </p>
                </button>

                <button
                    class="card-bg rounded-2xl p-6 gold-border smooth hover:scale-[1.02]"
                >
                    <i class="fa-solid fa-user-plus text-2xl gold-text mb-4"></i>

                    <p class="font-bold mb-1">
                        推薦好友
                    </p>

                    <p class="text-xs text-zinc-500">
                        REFERRAL
                    </p>
                </button>

            </div>

        </section>

        <!-- RECORD -->
        <section id="page-records" class="page-content">

            <h2 class="text-xl font-bold mb-5">
                小臉紀錄
            </h2>

            <div class="space-y-4">

                <div class="card-bg rounded-2xl p-6 gold-border">
                    <p class="font-bold mb-2">
                        一般調理紀錄
                    </p>

                    <p class="text-sm text-zinc-500">
                        TREATMENT RECORDS
                    </p>
                </div>

                <div class="card-bg rounded-2xl p-6 gold-border">
                    <p class="font-bold mb-2">
                        調理前後對比相簿
                    </p>

                    <p class="text-sm text-zinc-500">
                        BEFORE & AFTER
                    </p>
                </div>

            </div>

        </section>

        <!-- BOOKING -->
        <section id="page-booking" class="page-content">

            <div class="flex items-center justify-between mb-5">

                <div>
                    <p class="text-[10px] tracking-[0.3em] gold-text uppercase mb-1">
                        BOOKING SYSTEM
                    </p>

                    <h2 class="text-xl font-bold">
                        預約新理療
                    </h2>
                </div>

            </div>

            <!-- STEP 1 -->
            <div id="booking-step1" class="booking-step active">

                <div class="space-y-4">

                    <button
                        onclick="selectService('免費兩個月瘦小臉計畫')"
                        class="w-full text-left card-bg rounded-2xl p-6 gold-border smooth"
                    >
                        <p class="font-bold mb-1">
                            免費兩個月瘦小臉計畫
                        </p>

                        <p class="text-sm text-zinc-500">
                            FREE FACE PLAN
                        </p>
                    </button>

                    <button
                        onclick="selectService('精準局部體驗 ($400)')"
                        class="w-full text-left card-bg rounded-2xl p-6 gold-border smooth"
                    >
                        <p class="font-bold mb-1">
                            精準局部體驗 ($400)
                        </p>

                        <p class="text-sm text-zinc-500">
                            PARTIAL EXPERIENCE
                        </p>
                    </button>

                    <button
                        onclick="selectService('全息平衡調理 ($800)')"
                        class="w-full text-left card-bg rounded-2xl p-6 gold-border smooth"
                    >
                        <p class="font-bold mb-1">
                            全息平衡調理 ($800)
                        </p>

                        <p class="text-sm text-zinc-500">
                            FULL BALANCE
                        </p>
                    </button>

                </div>

            </div>

            <!-- STEP 2 -->
            <div id="booking-step2" class="booking-step">

                <button
                    onclick="backToStep1()"
                    class="text-sm text-zinc-500 mb-5"
                >
                    ← 返回項目選擇
                </button>

                <!-- SELECTED -->
                <div class="card-bg rounded-2xl p-5 gold-border mb-5">

                    <p class="text-xs text-zinc-500 mb-2">
                        已選擇項目
                    </p>

                    <p
                        id="selected-service"
                        class="font-bold gold-text"
                    >
                        -
                    </p>

                </div>

                <!-- DATE -->
                <div class="card-bg rounded-2xl p-5 gold-border mb-5">

                    <p class="font-bold mb-4">
                        選擇日期
                    </p>

                    <div class="flex space-x-3 overflow-x-auto pb-2">

                        <button
                            onclick="selectDate(this, '2026-05-27')"
                            class="date-btn px-4 py-3 rounded-xl bg-zinc-900 border border-zinc-800 smooth"
                        >
                            5/27
                        </button>

                        <button
                            onclick="selectDate(this, '2026-05-28')"
                            class="date-btn px-4 py-3 rounded-xl bg-zinc-900 border border-zinc-800 smooth"
                        >
                            5/28
                        </button>

                        <button
                            onclick="selectDate(this, '2026-05-29')"
                            class="date-btn px-4 py-3 rounded-xl bg-zinc-900 border border-zinc-800 smooth"
                        >
                            5/29
                        </button>

                    </div>

                </div>

                <!-- TIME -->
                <div class="card-bg rounded-2xl p-5 gold-border mb-6">

                    <p class="font-bold mb-4">
                        選擇時間
                    </p>

                    <div class="grid grid-cols-3 gap-3">

                        <button
                            onclick="selectTime(this, '13:00')"
                            class="time-btn py-3 rounded-xl bg-zinc-900 border border-zinc-800 smooth"
                        >
                            13:00
                        </button>

                        <button
                            onclick="selectTime(this, '15:00')"
                            class="time-btn py-3 rounded-xl bg-zinc-900 border border-zinc-800 smooth"
                        >
                            15:00
                        </button>

                        <button
                            onclick="selectTime(this, '17:00')"
                            class="time-btn py-3 rounded-xl bg-zinc-900 border border-zinc-800 smooth"
                        >
                            17:00
                        </button>

                    </div>

                </div>

                <!-- CONFIRM -->
                <button
                    onclick="submitBooking()"
                    class="w-full py-4 rounded-2xl bg-[#D4AF37] text-black font-bold smooth"
                >
                    確認送出預約
                </button>

            </div>

        </section>

    </main>

    <!-- BOTTOM NAV -->
    <nav class="fixed bottom-0 left-0 right-0 border-t border-zinc-900 bg-[#0A0A0A]/95 backdrop-blur">

        <div class="max-w-md mx-auto flex justify-around py-4">

            <button
                onclick="navTo('page-home')"
                class="flex flex-col items-center text-xs text-zinc-300"
            >
                <i class="fa-solid fa-house mb-2"></i>
                首頁
            </button>

            <button
                onclick="navTo('page-records')"
                class="flex flex-col items-center text-xs text-zinc-300"
            >
                <i class="fa-solid fa-file-lines mb-2"></i>
                紀錄
            </button>

            <button
                onclick="navTo('page-booking')"
                class="flex flex-col items-center text-xs text-zinc-300"
            >
                <i class="fa-solid fa-calendar mb-2"></i>
                預約
            </button>

        </div>

    </nav>

    <script>

        /*
        ==========================
        GLOBAL STATE
        ==========================
        */

        const bookingState = {
            service: null,
            date: null,
            time: null
        };

        /*
        ==========================
        PAGE NAVIGATION
        ==========================
        */

        function navTo(pageId) {

            const pages = document.querySelectorAll('.page-content');

            pages.forEach(page => {
                page.classList.remove('active');
            });

            document.getElementById(pageId).classList.add('active');
        }

        /*
        ==========================
        BOOKING STEP CONTROL
        ==========================
        */

        function showBookingStep(stepId) {

            const steps = document.querySelectorAll('.booking-step');

            steps.forEach(step => {
                step.classList.remove('active');
            });

            document.getElementById(stepId).classList.add('active');
        }

        /*
        ==========================
        SELECT SERVICE
        ==========================
        */

        function selectService(serviceName) {

            bookingState.service = serviceName;

            document.getElementById('selected-service').textContent =
                serviceName;

            showBookingStep('booking-step2');
        }

        /*
        ==========================
        BACK STEP
        ==========================
        */

        function backToStep1() {

            showBookingStep('booking-step1');
        }

        /*
        ==========================
        SELECT DATE
        ==========================
        */

        function selectDate(button, date) {

            bookingState.date = date;

            document.querySelectorAll('.date-btn').forEach(btn => {
                btn.classList.remove('selected-slot');
            });

            button.classList.add('selected-slot');
        }

        /*
        ==========================
        SELECT TIME
        ==========================
        */

        function selectTime(button, time) {

            bookingState.time = time;

            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.classList.remove('selected-slot');
            });

            button.classList.add('selected-slot');
        }

        /*
        ==========================
        SUBMIT BOOKING
        ==========================
        */

        function submitBooking() {

            if (!bookingState.service) {
                alert('請選擇服務項目');
                return;
            }

            if (!bookingState.date) {
                alert('請選擇日期');
                return;
            }

            if (!bookingState.time) {
                alert('請選擇時間');
                return;
            }

            console.log('Booking Data:', bookingState);

            alert(
                '預約成功！\n\n' +
                '項目：' + bookingState.service + '\n' +
                '日期：' + bookingState.date + '\n' +
                '時間：' + bookingState.time
            );
        }

        /*
        ==========================
        LIFF INIT
        ==========================
        */

        async function initLiff() {

            try {

                await liff.init({
                    liffId: "2010173212-2gFbVMbf"
                });

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                const profile = await liff.getProfile();

                updateUserUI(profile);

            } catch (err) {

                console.error('LIFF INIT ERROR:', err);

            }

        }

        /*
        ==========================
        UPDATE USER UI
        ==========================
        */

        function updateUserUI(profile) {

            document.getElementById('user-name').textContent =
                profile.displayName;

            document.getElementById('user-avatar').src =
                profile.pictureUrl;

        }

        /*
        ==========================
        START
        ==========================
        */

        initLiff();

    </script>

</body>
</html>
