<div id="booking-tab" class="tab-content hidden space-y-6">
    <h2 class="text-lg font-bold">預約新理療</h2>
    
    <div class="space-y-3">
        <div onclick="selectService(this)" class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 cursor-pointer">
            <div class="flex justify-between items-center"><p class="font-bold">免費兩個月瘦小臉計畫</p><p class="text-sm text-[#D4AF37]">免費</p></div>
        </div>
        <div onclick="selectService(this)" class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 cursor-pointer">
            <div class="flex justify-between items-center"><p class="font-bold">精準局部體驗</p><p class="text-sm">$400</p></div>
        </div>
        <div onclick="selectService(this)" class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 cursor-pointer">
            <div class="flex justify-between items-center"><p class="font-bold">全息平衡調理</p><p class="text-sm">$800</p></div>
        </div>
    </div>
    
    <div id="booking-details" class="hidden space-y-4">
        <p class="text-sm font-bold">選擇預約日期</p>
        <div id="date-container" class="flex space-x-2 overflow-x-auto pb-2 scrollbar-hide">
            </div>
        <p class="text-sm font-bold">選擇預約時段 (每 30 分鐘)</p>
        <div id="time-container" class="grid grid-cols-4 gap-2">
            </div>
        <button class="w-full py-4 bg-[#D4AF37] text-black font-bold rounded-2xl">確認送出預約</button>
    </div>
</div>

<script>
    // 在 initializeLiff() 之後加入以下生成邏輯
    function generateBookingUI() {
        const dateContainer = document.getElementById('date-container');
        const timeContainer = document.getElementById('time-container');
        const now = new Date();
        
        // 1. 生成未來 7 天
        for (let i = 0; i < 7; i++) {
            const d = new Date();
            d.setDate(now.getDate() + i);
            const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
            const div = document.createElement('div');
            div.className = "min-w-[60px] p-2 bg-zinc-900 rounded-xl text-center border border-zinc-800 cursor-pointer";
            div.innerHTML = `<p class="text-[10px]">${['日','一','二','三','四','五','六'][d.getDay()]}</p><p class="font-bold">${dateStr}</p>`;
            dateContainer.appendChild(div);
        }

        // 2. 生成時段 (10:00 - 20:00, 每 30 分鐘)
        // 邏輯：排除已過時間 (當前時間 + 1小時)
        const threshold = new Date(now.getTime() + 60 * 60 * 1000);
        for (let h = 10; h < 20; h++) {
            for (let m = 0; m < 60; m += 30) {
                const timeSlot = new Date();
                timeSlot.setHours(h, m, 0);
                
                if (timeSlot > threshold) {
                    const btn = document.createElement('button');
                    btn.className = "p-2 bg-zinc-900 rounded-lg text-[10px] border border-zinc-800";
                    btn.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
                    timeContainer.appendChild(btn);
                }
            }
        }
    }
    
    // 初始化時執行
    generateBookingUI();

    // 既有的選擇服務邏輯
    function selectService(el) {
        document.querySelectorAll('#booking-tab > div:first-of-type > div').forEach(d => d.classList.remove('selected-item'));
        el.classList.add('selected-item');
        document.getElementById('booking-details').classList.remove('hidden');
    }
</script>
