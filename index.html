<!DOCTYPE html>
<html lang="zh-TW" class="bg-[#0A0A0A]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耳顏所會員系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0A0A0A; color: #F5F5F5; }
        .tab-content.hidden { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 border-b border-zinc-900 sticky top-0 bg-[#0A0A0A]/90 backdrop-blur-md z-50">
        <p class="text-[10px] tracking-[0.2em] text-[#D4AF37] uppercase font-light">iAuri member</p>
        <h1 class="text-xl font-bold tracking-wide">耳顏所會員系統</h1>
    </header>

    <main class="max-w-md w-full mx-auto px-4 py-6">
        
        <div id="home-tab" class="tab-content space-y-6">
            <div class="bg-gradient-to-br from-zinc-900 to-black rounded-3xl p-6 border border-zinc-800">
                <div class="flex items-center space-x-4 mb-6">
                    <div class="w-14 h-14 rounded-full border-2 border-[#D4AF37]/50 overflow-hidden bg-zinc-800 shadow-xl">
                        <img id="user-avatar" src="" alt="頭像" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <div class="flex items-center space-x-2">
                            <span class="text-2xl text-[#D4AF37]"><i class="fa-solid fa-crown"></i></span>
                            <h2 id="user-name" class="text-lg font-bold">載入中...</h2>
                        </div>
                        <p class="text-xs text-[#D4AF37] mt-1">黃金會員</p>
                    </div>
                </div>
                
                <div class="space-y-2">
                    <div class="flex justify-between text-xs"><span>小臉養成計畫 (已預約 0/8 次)</span><span>0%</span></div>
                    <div class="h-2 bg-zinc-800 rounded-full overflow-hidden"><div class="h-full bg-[#D4AF37] w-[0%]"></div></div>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="showTab('booking')" class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 text-left"><i class="fa-solid fa-calendar mb-2 text-[#D4AF37]"></i><p class="text-sm font-bold">立即預約</p></button>
                <button class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 text-left"><i class="fa-solid fa-id-card mb-2 text-[#D4AF37]"></i><p class="text-sm font-bold">會員卡</p></button>
                <button onclick="showTab('records')" class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 text-left"><i class="fa-solid fa-file-lines mb-2 text-[#D4AF37]"></i><p class="text-sm font-bold">小臉紀錄</p></button>
                <button class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 text-left"><i class="fa-solid fa-link mb-2 text-[#D4AF37]"></i><p class="text-sm font-bold">推薦好友</p></button>
            </div>
        </div>

        <div id="records-tab" class="tab-content hidden space-y-6">
            <h2 class="text-lg font-bold">小臉紀錄</h2>
            <div class="grid grid-cols-1 gap-4">
                <button onclick="showSubTab('normal-list')" class="p-6 bg-zinc-900 rounded-2xl border border-zinc-800 text-left">
                    <i class="fa-solid fa-file-lines text-[#D4AF37] text-xl mb-2"></i>
                    <h3 class="font-bold">一般調理紀錄</h3>
                </button>
                <button onclick="showSubTab('photo-view')" class="p-6 bg-zinc-900 rounded-2xl border border-zinc-800 text-left">
                    <i class="fa-solid fa-camera text-[#D4AF37] text-xl mb-2"></i>
                    <h3 class="font-bold">小臉變化對比相簿</h3>
                </button>
            </div>
        </div>
        
        <div id="booking-tab" class="tab-content hidden text-center py-10">
            <p class="text-zinc-500">預約功能區塊</p>
        </div>
    </main>

    <nav class="fixed bottom-0 inset-x-0 bg-[#0A0A0A] border-t border-zinc-900 p-4 flex justify-around z-50">
        <button onclick="showTab('home')" class="text-[#D4AF37] flex flex-col items-center text-xs"><i class="fa-solid fa-house mb-1"></i>首頁</button>
        <button onclick="showTab('records')" class="text-zinc-500 flex flex-col items-center text-xs"><i class="fa-solid fa-file-lines mb-1"></i>紀錄</button>
        <button onclick="showTab('booking')" class="text-zinc-500 flex flex-col items-center text-xs"><i class="fa-solid fa-calendar mb-1"></i>預約</button>
    </nav>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`${tabId}-tab`).classList.remove('hidden');
        }
        function showSubTab(subTabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`${subTabId}-tab`).classList.remove('hidden');
        }
        async function initializeLiff() {
            try {
                await liff.init({ liffId: "2010173212-2gFbVMbf" });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById('user-name').innerText = profile.displayName;
                    document.getElementById('user-avatar').src = profile.pictureUrl;
                }
            } catch (err) { console.error(err); }
        }
        initializeLiff();
    </script>
</body>
</html>
