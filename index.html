<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>耳頷所會員系統</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://static.liff.line.me/edge/2/sdk.js"></script>
  <style>
    /* 隱藏滾動條但保持功能 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-black text-zinc-100 min-h-screen flex flex-col no-scrollbar select-none">

  <header class="sticky top-0 z-50 bg-black/80 backdrop-blur-md border-b border-zinc-900 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center space-x-3">
      <img id="user-avatar" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80" alt="Avatar" class="w-10 h-10 rounded-full border border-zinc-800 object-cover">
      <div>
        <div class="text-xs text-zinc-500">歡迎回來</div>
        <div id="user-name" class="text-sm font-semibold text-zinc-200">訪客用戶</div>
      </div>
    </div>
    <div class="bg-zinc-900 border border-zinc-800 px-3 py-1 rounded-full flex items-center space-x-1">
      <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
      <span class="text-xs text-zinc-400 font-medium">頂級會員</span>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto px-4 py-6 pb-24">
    
    <div id="tab-home" class="tab-content space-y-6">
      <div class="p-5 rounded-2xl bg-gradient-to-br from-zinc-900 to-black border border-zinc-800 relative overflow-hidden shadow-xl">
        <div class="absolute top-0 right-0 w-32 h-32 bg-amber-500/5 rounded-full blur-3xl"></div>
        <div class="flex items-center space-x-2 text-amber-500 text-xs font-semibold uppercase tracking-wider">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg>
          <span>專屬權益進度</span>
        </div>
        <h3 id="free-plan-text" class="text-base font-bold text-zinc-100 mt-2">小臉養成計畫 (已預約 0/8 次) 0%</h3>
        <div class="w-full bg-zinc-950 h-2.5 rounded-full mt-4 p-0.5 border border-zinc-800/50">
          <div id="free-plan-progress" class="bg-gradient-to-r from-amber-600 to-amber-400 h-1.5 rounded-full transition-all duration-500" style="w-full: 0%"></div>
        </div>
        <p class="text-xs text-zinc-500 mt-3 leading-relaxed">此進度條將動態追蹤您的預約次數，當完成 8 次免費瘦小臉計畫後，專案區塊將自動完成隱藏。</p>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <button onclick="showTab('booking')" class="p-4 rounded-xl bg-zinc-900 border border-zinc-800 flex flex-col items-center justify-center space-y-2 active:scale-95 transition-all">
          <div class="w-10 h-10 rounded-lg bg-amber-500/10 flex items-center justify-center text-amber-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
          </div>
          <span class="text-xs font-medium text-zinc-400">立即預約</span>
        </button>
        <button onclick="showTab('records')" class="p-4 rounded-xl bg-zinc-900 border border-zinc-800 flex flex-col items-center justify-center space-y-2 active:scale-95 transition-all">
          <div class="w-10 h-10 rounded-lg bg-zinc-800 flex items-center justify-center text-zinc-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg>
          </div>
          <span class="text-xs font-medium text-zinc-400">理療紀錄</span>
        </button>
      </div>
    </div>

    <div id="tab-booking" class="tab-content hidden space-y-6">
      <div class="flex items-center space-x-2 border-b border-zinc-900 pb-3">
        <h2 class="text-lg font-bold text-zinc-100">預約新理療</h2>
      </div>

      <form id="booking-form" class="space-y-6">
        <div class="space-y-3">
          <label class="text-xs font-semibold text-zinc-500 uppercase tracking-wider block">1. 選擇理療項目</label>
          <input type="hidden" id="selected-service" value="">
          
          <div class="space-y-3">
            <div id="free-plan-card" class="service-card p-4 rounded-xl border border-zinc-800 bg-zinc-900/50 flex justify-between items-center transition-all cursor-pointer" data-value="免費兩個月瘦小臉計畫">
              <div>
                <div class="font-medium text-zinc-200 text-sm">免費兩個月瘦小臉計畫</div>
                <div class="text-xs text-zinc-500 mt-1">專屬回饋計畫 · 耗時 45 分鐘</div>
              </div>
              <div class="text-sm font-semibold text-amber-500">NT$ 0</div>
            </div>
            
            <div class="service-card p-4 rounded-xl border border-zinc-800 bg-zinc-900/50 flex justify-between items-center transition-all cursor-pointer" data-value="基礎平衡耳頷理療項目">
              <div>
                <div class="font-medium text-zinc-200 text-sm">基礎平衡耳頷理療項目</div>
                <div class="text-xs text-zinc-500 mt-1">常規核心護理 · 耗時 60 分鐘</div>
              </div>
              <div class="text-sm font-semibold text-zinc-400">現場收費</div>
            </div>
          </div>
        </div>

        <div class="space-y-3">
          <label class="text-xs font-semibold text-zinc-500 uppercase tracking-wider block">2. 選擇預約日期</label>
          <input type="hidden" id="selected-date" value="">
          <div id="date-container" class="flex space-x-3 overflow-x-auto pb-2 no-scrollbar">
            </div>
        </div>

        <div class="space-y-3">
          <label class="text-xs font-semibold text-zinc-500 uppercase tracking-wider block">3. 選擇預約時段</label>
          <input type="hidden" id="selected-time" value="">
          
          <div class="grid grid-cols-3 gap-3">
            <button type="button" class="time-btn py-3 rounded-xl border border-zinc-800 bg-zinc-900/50 text-sm text-zinc-400 transition-all active:scale-95" data-value="13:00">13:00</button>
            <button type="button" class="time-btn py-3 rounded-xl border border-zinc-800 bg-zinc-900/50 text-sm text-zinc-400 transition-all active:scale-95" data-value="15:30">15:30</button>
            <button type="button" class="time-btn py-3 rounded-xl border border-zinc-800 bg-zinc-900/50 text-sm text-zinc-400 transition-all active:scale-95" data-value="19:00">19:00</button>
          </div>
        </div>

        <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 active:scale-[0.98] text-black font-semibold py-4 rounded-xl transition-all shadow-lg shadow-amber-500/10 mt-4 block text-center text-sm">
          確認送出預約
        </button>
      </form>
    </div>

    <div id="tab-records" class="tab-content hidden space-y-4">
      <div class="flex items-center space-x-2 border-b border-zinc-900 pb-3">
        <h2 class="text-lg font-bold text-zinc-100">理療歷史紀錄</h2>
      </div>
      <div id="record-list" class="space-y-3">
        </div>
    </div>

  </main>

  <nav class="fixed bottom-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-md border-t border-zinc-900 px-6 py-2 flex justify-around items-center">
    <button onclick="showTab('home')" id="nav-home" class="nav-item flex flex-col items-center space-y-1 text-amber-500 transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
      <span class="text-[10px] font-medium">首頁</span>
    </button>
    <button onclick="showTab('booking')" id="nav-booking" class="nav-item flex flex-col items-center space-y-1 text-zinc-500 transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
      <span class="text-[10px] font-medium">預約</span>
    </button>
    <button onclick="showTab('records')" id="nav-records" class="nav-item flex flex-col items-center space-y-1 text-zinc-500 transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
      <span class="text-[10px] font-medium">紀錄</span>
    </button>
  </nav>

  <script>
    // 1. 初始化 LINE LIFF 功能 (整合 async/await 排隊機制)
    async function initializeLiff() {
      try {
        // 請確保此處填入您正確的 LIFF ID
        await liff.init({ liffId: "2010173212-2gFbVMbf" });

        // 若使用者未在 LINE 登入，引導登入
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        // 成功取得個人資料
        const profile = await liff.getProfile();
        
        // 渲染名字與大頭貼到網頁上
        if (profile.displayName) {
          document.getElementById('user-name').innerText = profile.displayName;
        }
        if (profile.pictureUrl) {
          document.getElementById('user-avatar').src = profile.pictureUrl;
        }
      } catch (err) {
        console.error("LINE 登入功能初始化失敗：", err);
        document.getElementById('user-name').innerText = "訪客用戶";
      }
    }

    // 分頁切換控制
    function showTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));
      const activeTab = document.getElementById(`tab-${tabId}`);
      if (activeTab) activeTab.classList.remove('hidden');
      
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('text-amber-500');
        item.classList.add('text-zinc-500');
      });
      const activeNav = document.getElementById(`nav-${tabId}`);
      if (activeNav) {
        activeNav.classList.remove('text-zinc-500');
        activeNav.classList.add('text-amber-500');
      }
    }

    // 項目選擇器互動
    document.querySelectorAll('.service-card').forEach(card => {
      card.addEventListener('click', function() {
        document.querySelectorAll('.service-card').forEach(c => {
          c.classList.remove('border-amber-500', 'bg-amber-500/5');
          c.classList.add('border-zinc-800', 'bg-zinc-900/50');
        });
        this.classList.remove('border-zinc-800', 'bg-zinc-900/50');
        this.classList.add('border-amber-500', 'bg-amber-500/5');
        document.getElementById('selected-service').value = this.dataset.value;
      });
    });

    // 時段選擇器互動
    document.querySelectorAll('.time-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.time-btn').forEach(b => {
          b.classList.remove('border-amber-500', 'text-amber-500', 'bg-amber-500/10');
          b.classList.add('border-zinc-800', 'text-zinc-400', 'bg-zinc-900/50');
        });
        this.classList.remove('border-zinc-800', 'text-zinc-400', 'bg-zinc-900/50');
        this.classList.add('border-amber-500', 'text-amber-500', 'bg-amber-500/10');
        document.getElementById('selected-time').value = this.dataset.value;
      });
    });

    // 生產日期陣列項目
    function generateDates() {
      const dateContainer = document.getElementById('date-container');
      if (!dateContainer) return;
      dateContainer.innerHTML = '';
      
      const daysOfWeek = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      const today = new Date();
      
      for (let i = 0; i < 7; i++) {
        const futureDate = new Date(today);
        futureDate.setDate(today.getDate() + i);
        
        const dayName = i === 0 ? '今天' : daysOfWeek[futureDate.getDay()];
        const month = futureDate.getMonth() + 1;
        const date = futureDate.getDate();
        const dateString = `${month}/${date}`;
        const fullDateValue = `${futureDate.getFullYear()}-${String(month).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
        
        const dateBtn = document.createElement('button');
        dateBtn.type = 'button';
        dateBtn.className = 'date-btn flex flex-col items-center justify-center min-w-[64px] h-16 rounded-xl border border-zinc-800 bg-zinc-900/50 text-zinc-400 transition-all';
        dateBtn.dataset.date = fullDateValue;
        dateBtn.innerHTML = `
          <span class="text-xs text-zinc-500">${dayName}</span>
          <span class="text-sm font-semibold mt-1">${dateString}</span>
        `;
        
        dateBtn.addEventListener('click', function() {
          document.querySelectorAll('.date-btn').forEach(btn => {
            btn.classList.remove('border-amber-500', 'text-amber-500', 'bg-amber-500/10');
            btn.classList.add('border-zinc-800', 'text-zinc-400', 'bg-zinc-900/50');
          });
          this.classList.remove('border-zinc-800', 'text-zinc-400', 'bg-zinc-900/50');
          this.classList.add('border-amber-500', 'text-amber-500', 'bg-amber-500/10');
          document.getElementById('selected-date').value = this.dataset.date;
        });
        
        dateContainer.appendChild(dateBtn);
      }
    }

    // 檢查免費瘦小臉計畫預約次數，控制進度條與區塊隱藏
    function checkFreePlanStatus() {
      const records = JSON.parse(localStorage.getItem('booking_records') || '[]');
      const freePlanCount = records.filter(r => r.service === '免費兩個月瘦小臉計畫').length;
      
      const progressPercent = Math.min((freePlanCount / 8) * 100, 100);
      const progressBar = document.getElementById('free-plan-progress');
      const progressText = document.getElementById('free-plan-text');
      const freePlanCard = document.getElementById('free-plan-card');
      
      if (progressBar) progressBar.style.width = `${progressPercent}%`;
      if (progressText) progressText.innerText = `小臉養成計畫 (已預約 ${freePlanCount}/8 次) ${Math.round(progressPercent)}%`;
      
      // 滿 8 次自動隱藏該預約選項
      if (freePlanCount >= 8 && freePlanCard) {
        freePlanCard.style.display = 'none';
      } else if (freePlanCard) {
        freePlanCard.style.display = 'block';
      }
    }

    // 載入歷史紀錄項目
    function loadRecords() {
      const recordList = document.getElementById('record-list');
      if (!recordList) return;
      
      const records = JSON.parse(localStorage.getItem('booking_records') || '[]');
      if (records.length === 0) {
        recordList.innerHTML = '<div class="text-center text-zinc-500 py-12 text-sm">目前尚無前往理療的歷史紀錄。</div>';
        return;
      }
      
      recordList.innerHTML = records.reverse().map(r => `
        <div class="p-4 rounded-xl bg-zinc-900 border border-zinc-800 mb-3 flex justify-between items-center">
          <div>
            <div class="font-medium text-zinc-200 text-sm">${r.service}</div>
            <div class="text-xs text-zinc-500 mt-1">${r.date} ${r.time}</div>
          </div>
          <span class="text-xs px-2.5 py-1 rounded-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">已預約</span>
        </div>
      `).join('');
    }

    // 處理表單預約送出
    const bookingForm = document.getElementById('booking-form');
    if (bookingForm) {
      bookingForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const service = document.getElementById('selected-service').value;
        const date = document.getElementById('selected-date').value;
        const time = document.getElementById('selected-time').value;
        
        if (!service || !date || !time) {
          alert('請選擇完整的療程項目、日期與時段！');
          return;
        }
        
        const records = JSON.parse(localStorage.getItem('booking_records') || '[]');
        records.push({ service, date, time, timestamp: new Date().getTime() });
        localStorage.setItem('booking_records', JSON.stringify(records));
        
        alert('預約成功！');
        
        // 重置選取表單狀態
        document.getElementById('selected-service').value = '';
        document.getElementById('selected-date').value = '';
        document.getElementById('selected-time').value = '';
        document.querySelectorAll('.date-btn, .time-btn, .service-card').forEach(btn => {
          btn.classList.remove('border-amber-500', 'text-amber-500', 'bg-amber-500/10', 'bg-amber-500/5');
          btn.classList.add('border-zinc-800', 'text-zinc-400', 'bg-zinc-900/50');
        });
        
        checkFreePlanStatus();
        loadRecords();
        showTab('home');
      });
    }

    // 視窗完全載入時，排隊按順序執行
    window.onload = async function() {
      await initializeLiff(); // 第一優先：等 LINE 回傳頭像與名字
      generateDates();
      checkFreePlanStatus();
      loadRecords();
    };
  </script>
</body>
</html>
