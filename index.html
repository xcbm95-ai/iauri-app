<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Noto Sans TC',sans-serif;
}

body{

background:#000;
color:#fff;
overflow-x:hidden;

}

.main-bg{

background:
radial-gradient(circle at top,#2d2207 0%,#000 50%);

min-height:100vh;

}

.gold{

color:#D4AF37;

}

.glass{

background:
linear-gradient(
135deg,
rgba(212,175,55,.16),
rgba(255,255,255,.03)
);

border:1px solid rgba(212,175,55,.25);

backdrop-filter:blur(18px);

box-shadow:
0 0 40px rgba(212,175,55,.12);

}

.page{

display:none;
padding-bottom:120px;

}

.page.active{

display:block;

}

.bottom-nav{

position:fixed;
bottom:0;
left:0;

width:100%;
height:84px;

background:#050505;

border-top:
1px solid rgba(255,255,255,.08);

display:flex;
justify-content:space-around;
align-items:center;

z-index:99999;

}

.nav-btn{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

font-size:13px;

gap:4px;

color:#fff;

}

.nav-active{

color:#D4AF37;

}

.reward-card{

margin-top:20px;

padding:20px;

border-radius:28px;

background:
linear-gradient(
135deg,
rgba(212,175,55,.2),
rgba(255,255,255,.03)
);

border:
1px solid rgba(212,175,55,.3);

}

.reward-title{

font-size:13px;
letter-spacing:4px;

color:#D4AF37;

margin-bottom:12px;

}

.reward-prize{

font-size:28px;
font-weight:900;

line-height:1.4;

}

.wheel-wrap{

position:relative;

width:340px;
height:340px;

margin:auto;

}

.wheel{

width:100%;
height:100%;

border-radius:50%;

overflow:hidden;

position:relative;

border:10px solid #D4AF37;

transition:
transform 8s cubic-bezier(.08,.85,.12,1);

box-shadow:
0 0 60px rgba(212,175,55,.55);

}

.wheel-pointer{

position:absolute;

top:-8px;
left:50%;

transform:translateX(-50%);

z-index:20;

width:0;
height:0;

border-left:22px solid transparent;
border-right:22px solid transparent;
border-top:42px solid #D4AF37;

filter:
drop-shadow(0 0 10px #D4AF37);

}

.wheel-center{

position:absolute;

width:110px;
height:110px;

border-radius:50%;

background:
radial-gradient(circle,#ffe88f,#D4AF37,#7a5b00);

top:50%;
left:50%;

transform:translate(-50%,-50%);

z-index:30;

border:
6px solid rgba(255,255,255,.35);

box-shadow:
0 0 30px rgba(255,215,0,.6);

}

.spin-glow{

animation:glow 2s infinite alternate;

}

@keyframes glow{

from{

box-shadow:
0 0 20px rgba(212,175,55,.3);

}

to{

box-shadow:
0 0 45px rgba(212,175,55,.7);

}

}

.record-card{

padding:18px;

border-radius:24px;

margin-bottom:18px;

background:
linear-gradient(
135deg,
rgba(212,175,55,.13),
rgba(255,255,255,.02)
);

border:
1px solid rgba(212,175,55,.2);

}

</style>

<script type="module">

import {
initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
updateDoc,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyDO77Pw12IXXeHECJy3YSTcCV9ikok1ev8",

authDomain: "iauri-member.firebaseapp.com",

projectId: "iauri-member",

storageBucket: "iauri-member.firebasestorage.app",

messagingSenderId: "787600565952",

appId: "1:787600565952:web:460864719a5f543844ef25"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* LIFF */

await liff.init({
liffId: "2007418706-BR1a6j7x"
});

if(!liff.isLoggedIn()){

liff.login();

}

const profile = await liff.getProfile();

const lineUserId = profile.userId;

window.memberData = null;

/* MEMBER */

const memberRef =
doc(db,"members",lineUserId);

const memberSnap =
await getDoc(memberRef);

if(!memberSnap.exists()){

await setDoc(memberRef,{

lineUserId: lineUserId,

displayName: profile.displayName,

photoUrl: profile.pictureUrl,

points: 0,

freeFaceUsedCount: 0,

remainingDrawCount: 1,

latestPrize: "",

latestPrizeRedeemed: true,

createdAt: Date.now()

});

}

const latestSnap =
await getDoc(memberRef);

window.memberData =
latestSnap.data();

/* UI */

document.getElementById("memberPhoto").src =
window.memberData.photoUrl;

document.getElementById("memberName").innerText =
window.memberData.displayName;

document.getElementById("pointsText").innerText =
window.memberData.points;

document.getElementById("freeFaceText").innerText =
`${window.memberData.freeFaceUsedCount}/8次`;

document.getElementById("freeFaceBar").style.width =
`${(window.memberData.freeFaceUsedCount/8)*100}%`;

/* REWARD */

if(
window.memberData.latestPrize &&
window.memberData.latestPrizeRedeemed === false
){

document.getElementById("rewardArea").innerHTML = `

<div class="reward-card">

<div class="reward-title">
IAURI PRIVILEGE
</div>

<div class="reward-prize">
${window.memberData.latestPrize}
</div>

<div class="text-white/60 mt-3 leading-loose">
請於下次來店時出示本畫面
</div>

</div>

`;

}

/* DRAW ENTRY */

if(window.memberData.remainingDrawCount > 0){

document.getElementById("drawEntryArea").innerHTML = `

<button
onclick="showPage('drawPage')"
class="w-full mt-6 h-[76px] rounded-full bg-[#D4AF37] text-black text-3xl font-black"
>
幸運轉轉樂
</button>

`;

}

/* PAGE */

window.showPage = function(pageId){

document
.querySelectorAll(".page")
.forEach(page=>{

page.classList.remove("active");

});

document
.getElementById(pageId)
.classList.add("active");

}

/* DRAW */

const prizes = [

{
name:"體驗券400元",
weight:24,
angle:30
},

{
name:"國際大師指定體驗",
weight:18,
angle:90
},

{
name:"體驗券800元",
weight:22,
angle:150
},

{
name:"三人同行五折",
weight:18,
angle:210
},

{
name:"體驗券1500元",
weight:8,
angle:270
},

{
name:"兩人同行八折",
weight:20,
angle:330
}

];

let spinning = false;

let currentRotate = 0;

function getWeightedPrize(){

const total =
prizes.reduce((a,b)=>a+b.weight,0);

let random =
Math.random() * total;

for(const prize of prizes){

if(random < prize.weight){

return prize;

}

random -= prize.weight;

}

return prizes[0];

}

window.startSpin = async function(){

if(spinning) return;

spinning = true;

const spinBtn =
document.getElementById("spinBtn");

spinBtn.disabled = true;

const prize =
getWeightedPrize();

const wheel =
document.getElementById("wheel");

const extraSpin =
360 * 8;

const finalAngle =
360 - prize.angle;

currentRotate +=
extraSpin + finalAngle;

wheel.style.transform =
`rotate(${currentRotate}deg)`;

setTimeout(async()=>{

alert(`恭喜中獎：${prize.name}`);

await updateDoc(memberRef,{

remainingDrawCount: 0,

latestPrize: prize.name,

latestPrizeRedeemed: false

});

await addDoc(
collection(db,"draw_records"),
{

lineUserId,

prize: prize.name,

createdAt: Date.now()

}
);

location.reload();

},8500);

}

</script>
