<!DOCTYPE html>
<html lang="zh-TW" class="bg-[#0A0A0A]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耳顏所會員系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0A0A0A; color: #F5F5F5; }
        .tab-content.hidden { display: none; }
        .selected-item { border-color: #D4AF37 !important; background-color: #18181b; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 border-b border-zinc-900 sticky top-0 bg-[#0A0A0A]/90 backdrop-blur-md z-50">
        <p class="text-[10px] tracking-[0.2em] text-[#D4AF37] uppercase font-light">iAuri member</p>
        <h1 class="text-xl font-bold tracking-wide">耳顏所會員系統</h1>
    </header>

    <main class="max-w-md w-full mx-auto px-4 py-6">
        
        <div id="home-tab" class="tab-content space-y-6">
            <div class="bg-gradient-to-br from-zinc-900 to-black rounded-3xl p-6 border border-zinc-800">
                <div class="flex items-center space-x-4 mb-6">
                    <div class="w-14 h-14 rounded-full border-2 border-[#D4AF37]/50 overflow-hidden bg-zinc-800 shrink-0">
                        <img id="user-avatar" src="" alt="頭像" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <div class="flex items-center space-x-2">
                            <span class="text-2xl text-[#D4AF37]"><i class="fa-solid fa-crown"></i></span>
                            <h2 id="user-name" class="text-lg font-bold">載入中...</h2>
                        </div>
                        <p class="text-xs text-[#D4AF37] mt-1">黃金會員</p>
                    </div>
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between text-xs text-zinc-400"><span>小臉養成計畫 (已預約 0/8 次)</span><span>0%</span></div>
                    <div class="h-2 bg-zinc-800 rounded-full overflow-hidden"><div class="h-full bg-[#D4AF37] w-[0%]"></div></div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="showTab('booking')" class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 text-left"><i class="fa-solid fa-calendar mb-2 text-[#D4AF37]"></i><p class="text-sm font-bold">立即預約</p></button>
                <button class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 text-left"><i class="fa-solid fa-id-card mb-2 text-[#D4AF37]"></i><p class="text-sm font-bold">會員卡</p></button>
                <button onclick="showTab('records')" class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 text-left"><i class="fa-solid fa-file-lines mb-2 text-[#D4AF37]"></i><p class="text-sm font-bold">小臉紀錄</p></button>
                <button class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 text-left"><i class="fa-solid fa-link mb-2 text-[#D4AF37]"></i><p class="text-sm font-bold">推薦好友</p></button>
            </div>
        </div>

        <div id="records-tab" class="tab-content hidden space-y-6">
            <h2 class="text-lg font-bold">小臉紀錄</h2>
            <div class="p-6 bg-zinc-900 rounded-2xl border border-zinc-800 cursor-pointer hover:border-[#D4AF37]">
                <i class="fa-solid fa-images text-[#D4AF37] text-2xl mb-4"></i>
                <h3 class="font-bold">一般調理相簿</h3>
                <p class="text-xs text-zinc-500 mt-1">查看所有調理紀錄照片</p>
            </div>
            <div class="p-6 bg-zinc-900 rounded-2xl border border-zinc-800 cursor-pointer hover:border-[#D4AF37]">
                <i class="fa-solid fa-arrows-left-right text-[#D4AF37] text-2xl mb-4"></i>
                <h3 class="font-bold">調理前後對比相簿</h3>
                <p class="text-xs text-zinc-500 mt-1">查看前後對比影像</p>
            </div>
        </div>

        <div id="booking-tab" class="tab-content hidden space-y-6">
            <h2 class="text-lg font-bold">預約新理療</h2>
            <div class="space-y-3">
                <div onclick="selectService(this)" class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 cursor-pointer">
                    <div class="flex justify-between items-center"><p class="font-bold">免費兩個月瘦小臉計畫</p><p class="text-sm text-[#D4AF37]">免費</p></div>
                </div>
                <div onclick="selectService(this)" class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 cursor-pointer">
                    <div class="flex justify-between items-center"><p class="font-bold">精準局部體驗</p><p class="text-sm">$400</p></div>
                </div>
                <div onclick="selectService(this)" class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 cursor-pointer">
                    <div class="flex justify-between items-center"><p class="font-bold">全息平衡調理</p><p class="text-sm">$800</p></div>
                </div>
            </div>
            
            <div id="booking-details" class="hidden space-y-4">
                <p class="text-sm font-bold">選擇預約日期</p>
                <div id="date-container" class="flex space-x-2 overflow-x-auto pb-2 scrollbar-hide"></div>
                <p class="text-sm font-bold">選擇預約時段</p>
                <div id="time-container" class="grid grid-cols-4 gap-2"></div>
                <button class="w-full py-4 bg-[#D4AF37] text-black font-bold rounded-2xl">確認送出預約</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 inset-x-0 bg-[#0A0A0A] border-t border-zinc-900 p-4 flex justify-around z-50">
        <button onclick="showTab('home')" class="text-[#D4AF37] flex flex-col items-center text-xs"><i class="fa-solid fa-house mb-1"></i>首頁</button>
        <button onclick="showTab('records')" class="text-zinc-500 flex flex-col items-center text-xs"><i class="fa-solid fa-file-lines mb-1"></i>紀錄</button>
        <button onclick="showTab('booking')" class="text-zinc-500 flex flex-col items-center text-xs"><i class="fa-solid fa-calendar mb-1"></i>預約</button>
    </nav>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`${tabId}-tab`).classList.remove('hidden');
        }
        function selectService(el) {
            document.querySelectorAll('#booking-tab > div:first-of-type > div').forEach(d => d.classList.remove('selected-item'));
            el.classList.add('selected-item');
            document.getElementById('booking-details').classList.remove('hidden');
        }

        function generateBookingUI() {
            const dateContainer = document.getElementById('date-container');
            const timeContainer = document.getElementById('time-container');
            const now = new Date();
            
            for (let i = 0; i < 7; i++) {
                const d = new Date();
                d.setDate(now.getDate() + i);
                const div = document.createElement('div');
                div.className = "min-w-[60px] p-2 bg-zinc-900 rounded-xl text-center border border-zinc-800 cursor-pointer";
                div.innerHTML = `<p class="text-[10px]">${['日','一','二','三','四','五','六'][d.getDay()]}</p><p class="font-bold">${d.getMonth()+1}/${d.getDate()}</p>`;
                dateContainer.appendChild(div);
            }

            const threshold = new Date(now.getTime() + 60 * 60 * 1000);
            for (let h = 10; h < 20; h++) {
                for (let m = 0; m < 60; m += 30) {
                    const slot = new Date();
                    slot.setHours(h, m, 0);
                    if (slot > threshold) {
                        const btn = document.createElement('button');
                        btn.className = "p-2 bg-zinc-900 rounded-lg text-[10px] border border-zinc-800";
                        btn.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
                        timeContainer.appendChild(btn);
                    }
                }
            }
        }
        
        async function initializeLiff() {
            try {
                await liff.init({ liffId: "2010173212-2gFbVMbf" });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById('user-name').innerText = profile.displayName;
                    document.getElementById('user-avatar').src = profile.pictureUrl;
                }
            } catch (err) { console.error(err); }
        }
        
        generateBookingUI();
        initializeLiff();
    </script>
</body>
</html>
