<body class="bg-[#0A0A0A] text-[#F5F5F5] antialiased min-h-screen flex flex-col justify-between pb-24">

            <p class="text-[10px] tracking-[0.2em] text-[#D4AF37] uppercase font-light">M E M B E R</p>

        </div>
        <div class="relative w-10 h-10 rounded-full border border-[#D4AF37]/30 overflow-hidden bg-zinc-900">
            <img id="user-avatar" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80" alt="頭像" class="w-full h-full object-cover">
        </div>
    </header>

    <main class="flex-1 max-w-md w-full mx-auto px-4 py-6 space-y-6">
        
        <div id="home-tab" class="tab-content space-y-6">
            <div class="bg-gradient-to-br from-zinc-900 via-zinc-900 to-black rounded-3xl p-6 border border-zinc-800/80 shadow-2xl relative overflow-hidden backdrop-blur-md">
                <div class="flex items-start justify-between">

                        </div>
                        <div>
                            <h2 id="user-name" class="text-lg font-bold tracking-wide">訪客用戶</h2>

                    </div>

                        </label>

                        <label class="relative flex items-center justify-between p-4 bg-zinc-900/40 rounded-xl border border-zinc-800/60 cursor-pointer select-none group transition-all">

                                <span class="font-medium text-sm text-zinc-200">精準局部體驗</span>
                                <p class="text-xs text-zinc-500 mt-1 font-light">針對特定不適點加強</p>
                            </div>
                            <span class="text-sm font-medium text-zinc-400 tracking-wide">$400</span>
                            <div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-amber-500/50 bg-amber-500/[0.02] opacity-0 peer-checked:opacity-100 transition-all pointer-events-none"></div>
                        </label>

                        <label class="relative flex items-center justify-between p-4 bg-zinc-900/40 rounded-xl border border-zinc-800/60 cursor-pointer select-none group transition-all">
                            <input type="radio" name="service" value="全息平衡調理" class="hidden peer">
                            <div class="flex-1 pr-4">
                                <span class="font-medium text-sm text-zinc-200">全息平衡調理</span>
                                <p class="text-xs text-zinc-500 mt-1 font-light">全身性耳穴全息舒緩與平衡</p>
                            </div>
                            <span class="text-sm font-medium text-zinc-400 tracking-wide">$800</span>
                            <div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-amber-500/50 bg-amber-500/[0.02] opacity-0 peer-checked:opacity-100 transition-all pointer-events-none"></div>
                        </label>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-xs text-zinc-400 font-light tracking-wide">選擇預約日期</label>
                    <div id="date-container" class="flex space-x-3 overflow-x-auto pb-2 hide-scrollbar">
                        </div>

                <div class="space-y-3">

                    <div class="grid grid-cols-3 gap-3">

                        </label>
                        <label class="relative flex items-center justify-center p-3 bg-zinc-900/40 rounded-xl border border-zinc-800/60 cursor-pointer select-none transition-all">
                            <input type="radio" name="time" value="13:30" class="hidden peer">

                            <div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-amber-500/50 bg-amber-500/[0.02] pointer-events-none"></div>
                        </label>
                        <label class="relative flex items-center justify-center p-3 bg-zinc-900/40 rounded-xl border border-zinc-800/60 cursor-pointer select-none transition-all">
                            <input type="radio" name="time" value="15:00" class="hidden peer">
                            <span class="text-sm font-medium text-zinc-300 peer-checked:text-amber-500">15:00</span>
                            <div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-amber-500/50 bg-amber-500/[0.02] pointer-events-none"></div>
                        </label>
                        <label class="relative flex items-center justify-center p-3 bg-zinc-900/40 rounded-xl border border-zinc-800/60 cursor-pointer select-none transition-all">
                            <input type="radio" name="time" value="16:30" class="hidden peer">
                            <span class="text-sm font-medium text-zinc-300 peer-checked:text-amber-500">16:30</span>
                            <div class="absolute inset-0 rounded-xl border-2 border-transparent peer-checked:border-amber-500/50 bg-amber-500/[0.02] pointer-events-none"></div>
                        </label>
                        <label class="relative flex items-center justify-center p-3 bg-zinc-900/40 rounded-xl border border-zinc-800/60 cursor-pointer select-none transition-all">

                            <span class="text-sm font-medium text-zinc-300 peer-checked:text-amber-500">19:00</span>

                <input type="hidden" id="selected-time" value="10:00">

                <button type="submit" class="w-full bg-gradient-to-r from-[#AA7C11] via-[#D4AF37] to-[#AA7C11] hover:opacity-90 text-black font-bold py-4 rounded-xl shadow-xl transition-all tracking-wide text-sm">

        <div id="profile-tab" class="tab-content hidden space-y-6">
            <h2 class="text-lg font-bold tracking-wide">會員資料中心</h2>
            <div class="bg-zinc-900/30 border border-zinc-900 rounded-2xl p-5 space-y-4 backdrop-blur-sm">
                <div class="flex justify-between items-center py-2 border-b border-zinc-900/50">
                    <span class="text-sm text-zinc-400 font-light">會員等級</span>
                    <span class="text-sm font-medium text-[#D4AF37]">黃金尊榮會員</span>
                </div>
                <div class="flex justify-between items-center py-2 border-b border-zinc-900/50">
                    <span class="text-sm text-zinc-400 font-light">註冊時間</span>
                    <span class="text-sm text-zinc-500 font-light">2026.05.27</span>
                </div>
                <div class="flex justify-between items-center py-2">
                    <span class="text-sm text-zinc-400 font-light">系統狀態</span>
                    <span class="text-sm text-emerald-400 flex items-center"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400 mr-2 animate-pulse"></span>已連線 LINE 認證</span>
                </div>
            </div>
            <button onclick="liff.logout(); location.reload();" class="w-full bg-zinc-900 hover:bg-zinc-800 text-zinc-400 font-medium py-3 rounded-xl border border-zinc-800/80 transition-all text-xs tracking-wide">
                登出會員系統

        </div>

    </main>

    <nav class="fixed bottom-0 inset-x-0 bg-[#0A0A0A]/90 backdrop-blur-md border-t border-zinc-900 py-3 flex justify-around items-center z-50 max-w-md mx-auto">
        <button onclick="showTab('home')" id="nav-home" class="flex flex-col items-center space-y-1 text-zinc-500 transition-colors nav-active">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[10px] font-light">首頁</span>
        </button>
        <button onclick="showTab('records')" id="nav-records" class="flex flex-col items-center space-y-1 text-zinc-500 transition-colors">
            <i class="fa-regular fa-clipboard text-lg"></i>
            <span class="text-[10px] font-light">紀錄</span>
        </button>
        <button onclick="showTab('booking')" id="nav-booking" class="flex flex-col items-center space-y-1 text-zinc-500 transition-colors">
            <i class="fa-regular fa-calendar text-lg"></i>
            <span class="text-[10px] font-light">預約</span>
        </button>
        <button onclick="showTab('profile')" id="nav-profile" class="flex flex-col items-center space-y-1 text-zinc-500 transition-colors">
            <i class="fa-regular fa-user text-lg"></i>
            <span class="text-[10px] font-light">會員</span>
        </button>
    </nav>

    <script>
        // 切換分頁邏輯
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`${tabId}-tab`).classList.remove('hidden');

            document.querySelectorAll('nav button').forEach(el => el.classList.remove('nav-active'));
            document.getElementById(`nav-${tabId}`).classList.add('nav-active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 模擬理療紀錄資料庫
        let appointmentRecords = [];

        // 自動渲染未來 7 天的預約日期
        function generateDates() {
            const dateContainer = document.getElementById('date-container');
            dateContainer.innerHTML = '';
            const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            
            for (let i = 0; i < 7; i++) {
                const date = new Date();
                date.setDate(date.getDate() + i);
                
                const dayName = i === 0 ? '今天' : days[date.getDay()];
                const dateStr = `${date.getMonth() + 1}/${date.getDate()}`;
                const fullDateValue = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;

                if (i === 0) {
                    document.getElementById('selected-date').value = fullDateValue;
                }

                const dateBtn = document.createElement('label');
                dateBtn.className = `relative flex flex-col items-center justify-center p-3 bg-zinc-900/40 rounded-xl border ${i === 0 ? 'border-amber-500/50 bg-amber-500/[0.02]' : 'border-zinc-800/60'} min-w-[64px] h-16 cursor-pointer select-none transition-all shrink-0`;
                dateBtn.innerHTML = `
                    <input type="radio" name="booking_date_radio" value="${fullDateValue}" class="hidden peer" ${i === 0 ? 'checked' : ''}>
                    <span class="text-[10px] text-zinc-500 font-light peer-checked:text-amber-500">${dayName}</span>
                    <span class="text-xs font-bold mt-1 text-zinc-300 peer-checked:text-amber-500">${dateStr}</span>
                `;

                // 綁定日期切換事件
                dateBtn.querySelector('input').addEventListener('change', function(e) {
                    document.getElementById('selected-date').value = e.target.value;
                    document.querySelectorAll('input[name="booking_date_radio"]').forEach(radio => {
                        const parent = radio.parentElement;
                        parent.classList.remove('border-amber-500/50', 'bg-amber-500/[0.02]');
                        parent.classList.add('border-zinc-800/60');
                    });
                    if (e.target.checked) {
                        const activeParent = e.target.parentElement;
                        activeParent.classList.remove('border-zinc-800/60');
                        activeParent.classList.add('border-amber-500/50', 'bg-amber-500/[0.02]');
                    }
                });

                dateContainer.appendChild(dateBtn);
            }
        }

        // 綁定療程項目與時段的隱藏欄位同步
        document.querySelectorAll('input[name="service"]').forEach(input => {
            input.addEventListener('change', (e) => { document.getElementById('selected-service').value = e.target.value; });
        });
        document.querySelectorAll('input[name="time"]').forEach(input => {
            input.addEventListener('change', (e) => { document.getElementById('selected-time').value = e.target.value; });
        });

        // 檢查並渲染小臉計畫進度條
        function checkFreePlanStatus() {
            const freePlanCount = appointmentRecords.filter(r => r.service === "免費兩個月瘦小臉計畫").length;
            const currentCount = Math.min(freePlanCount, 8);
            
            document.getElementById('reserved-count').innerText = currentCount;
            const percent = Math.round((currentCount / 8) * 100);
            document.getElementById('progress-percent').innerText = `${percent}%`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }

        // 渲染歷史紀錄列表
        function loadRecords() {
            const listContainer = document.getElementById('records-list');
            if (appointmentRecords.length === 0) {
                listContainer.innerHTML = `
                    <div class="bg-zinc-900/30 border border-zinc-900 rounded-2xl p-6 text-center text-zinc-500 font-light backdrop-blur-sm">
                        目前尚無前往理療的歷史紀錄。
                    </div>`;
                return;
            }

            listContainer.innerHTML = appointmentRecords.map(rec => `
                <div class="bg-zinc-900/40 border border-zinc-800/50 rounded-2xl p-5 space-y-3 backdrop-blur-sm relative overflow-hidden">
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-bold text-sm text-zinc-200 tracking-wide">${rec.service}</h4>
                            <p class="text-xs text-zinc-500 font-light mt-1"><i class="fa-regular fa-clock mr-1.5"></i>${rec.date} ${rec.time}</p>
                        </div>
                        <span class="bg-amber-500/10 text-amber-500 text-[10px] px-2 py-0.5 rounded-full font-medium tracking-wide">已預約完成</span>
                    </div>
                </div>
            `).join('');
        }

        // 表單送出處理
        const bookingForm = document.getElementById('booking-form');
        bookingForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const service = document.getElementById('selected-service').value;
            const date = document.getElementById('selected-date').value;
            const time = document.getElementById('selected-time').value;

            if (!date) { alert('請選擇預約日期！'); return; }

            // 新增至本地紀錄
            appointmentRecords.unshift({ service, date, time });
            alert(`預約成功！\n項目：${service}\n時間：${date} ${time}`);

            // 重設表單狀態與畫面更新
            document.querySelectorAll('input[name="service"]')[0].checked = true;
            document.querySelectorAll('input[name="time"]')[0].checked = true;
            document.getElementById('selected-service').value = '免費兩個月瘦小臉計畫';
            document.getElementById('selected-time').value = '10:00';
            document.querySelectorAll('input[name="booking_date_radio"]').forEach((btn, idx) => {
                const parent = btn.parentElement;
                parent.classList.remove('border-amber-500/50', 'bg-amber-500/[0.02]');
                parent.classList.add('border-zinc-800/60');
                if(idx === 0) {
                    btn.checked = true;
                    parent.classList.remove('border-zinc-800/60');
                    parent.classList.add('border-amber-500/50', 'bg-amber-500/[0.02]');
                    document.getElementById('selected-date').value = btn.value;
                }
            });

            checkFreePlanStatus();
            loadRecords();
            showTab('home');
        });

        // ==================== LINE LIFF 初始化邏輯 (修正版) ====================
        async function initializeLiff() {
            try {
                // 1. 初始化 LIFF 
                await liff.init({ liffId: "2010173212-2gFbVMbf" });

                // 2. 判斷是否在 LINE 環境中登入
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                // 3. 取得用戶 LINE Profile 資料
                const profile = await liff.getProfile();
                
                // 4. 將抓到的 LINE 資料渲染到對應的 HTML 元件上
                if (profile.displayName) {
                    document.getElementById('user-name').innerText = profile.displayName;
                }
                if (profile.pictureUrl) {
                    document.getElementById('user-avatar').src = profile.pictureUrl;
                }

            } catch (err) {
                console.error("LIFF 初始化或獲取資料失敗：", err);
                document.getElementById('user-name').innerText = "載入失敗";
            }
        }

        // 視窗完全載入時，嚴格排隊按順序執行
        window.onload = async function() {
            await initializeLiff(); // 第一優先：等 LINE 回傳頭像與名字後，才准渲染其餘畫面
            generateDates();
            checkFreePlanStatus();
            loadRecords();
        };
    </script>
</body>
</html>
