<!DOCTYPE html>
<html lang="zh-TW" class="bg-[#0A0A0A]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耳顏所會員系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0A0A0A; color: #F5F5F5; }
        .page { display: none; }
        .page.active { display: block; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 border-b border-zinc-900 sticky top-0 bg-[#0A0A0A]/90 z-50">
        <h1 class="text-xl font-bold">耳顏所會員系統</h1>
    </header>

    <main class="max-w-md w-full mx-auto px-4 py-6">
        
        <div id="home-page" class="page active space-y-6">
            <div class="bg-zinc-900 rounded-3xl p-6">
                <div class="flex items-center space-x-4 mb-4">
                    <img id="user-avatar" class="w-14 h-14 rounded-full bg-zinc-800">
                    <div><h2 id="user-name" class="font-bold">載入中...</h2><p class="text-xs text-[#D4AF37]">黃金會員</p></div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="showPage('booking-page')" class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800">立即預約</button>
                <button class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800">會員卡</button>
                <button onclick="showPage('records-page')" class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800">小臉紀錄</button>
                <button class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800">推薦好友</button>
            </div>
        </div>

        <div id="records-page" class="page space-y-6">
            <h2 class="text-lg font-bold">一般調理紀錄</h2>
            <div class="p-4 bg-zinc-900 rounded-xl">文字調理紀錄內容...</div>
            <h2 class="text-lg font-bold">小臉紀錄 (左右滑動)</h2>
            <div class="flex space-x-4 overflow-x-auto scrollbar-hide">
                <div class="min-w-[200px] h-40 bg-zinc-800 rounded-xl flex items-center justify-center">相簿照片</div>
            </div>
        </div>

        <div id="booking-page" class="page space-y-6">
            <h2 class="text-lg font-bold">預約新理療</h2>
            <div class="space-y-3">
                <div class="p-4 bg-zinc-900 rounded-xl border border-zinc-700">免費兩個月瘦小臉計畫</div>
                <div class="p-4 bg-zinc-900 rounded-xl border border-zinc-700">精準局部體驗 ($400)</div>
                <div class="p-4 bg-zinc-900 rounded-xl border border-zinc-700">全息平衡調理 ($800)</div>
            </div>
            <button class="w-full py-4 bg-[#D4AF37] text-black font-bold rounded-xl">確認送出預約</button>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-[#0A0A0A] border-t border-zinc-900 flex justify-around p-4">
        <button onclick="showPage('home-page')">首頁</button>
        <button onclick="showPage('records-page')">紀錄</button>
        <button onclick="showPage('booking-page')">預約</button>
    </nav>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        // 初始化 LIFF 獲取頭像與暱稱
        async function initLiff() {
            try {
                await liff.init({ liffId: "2010173212-2gFbVMbf" });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById('user-name').innerText = profile.displayName;
                    document.getElementById('user-avatar').src = profile.pictureUrl;
                }
            } catch (err) { console.error(err); }
        }
        initLiff();
    </script>
</body>
</html>
